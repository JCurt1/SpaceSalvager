<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Space Salvager - ASCII Expanded Edition</title>
    <style>
        body {
            background-color: #121214;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            max-width: 700px;
            margin: 0 auto;
        }
        .stats-panel {
            border: 1px solid #00ff66;
            padding: 12px;
            margin-bottom: 20px;
            background-color: #1a1a1e;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .stat-col {
            flex: 1;
        }
        .combat-zone {
            background: #251111;
            border: 1px solid #ff3333;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
        }
        .enemy-container {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
        }
        .enemy-box {
            text-align: center;
            border: 1px dashed #ff3333;
            padding: 10px;
            width: 45%;
        }
        pre {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            line-height: 1.1;
            margin: 10px 0;
            color: #ff3333;
            background: #150808;
            padding: 5px;
            border-radius: 4px;
        }
        .hero-pre {
            color: #00ff66;
            background: none;
            margin: 0;
            padding: 0;
            font-size: 0.75rem;
        }
        .story-text {
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 25px;
            min-height: 120px;
            white-space: pre-line;
        }
        .combat-log {
            color: #ffcc00;
            font-size: 0.95rem;
            margin-top: 15px;
            border-top: 1px solid #ffcc00;
            padding-top: 10px;
            max-height: 120px;
            overflow-y: auto;
        }
        .btn {
            display: block;
            width: 100%;
            background: #1a1a1e;
            color: #00ff66;
            border: 1px solid #00ff66;
            padding: 12px;
            margin-bottom: 10px;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            text-align: left;
        }
        .btn:hover {
            background: #00ff66;
            color: #121214;
        }
        .btn-combat {
            border-color: #ff3333;
            color: #ff3333;
        }
        .btn-combat:hover {
            background: #ff3333;
            color: #121214;
        }
    </style>
</head>
<body>

    <div class="stats-panel">
        <div class="stat-col">
<pre class="hero-pre">
 O 
/|\  [<span id="player-weapon">Unarmed</span>]
/ \  
</pre>
            <strong>HP:</strong> <span id="player-hp">80</span>/<span id="player-max-hp">100</span><br>
            <strong>CREDITS:</strong> 🪙<span id="player-credits">0</span>
        </div>
        <div class="stat-col" style="text-align: center;">
            <strong>LVL:</strong> <span id="player-lvl">1</span><br>
            <strong>EXP:</strong> <span id="player-exp">0</span> / <span id="player-next-exp">100</span><br>
            <span id="stat-points-alert" style="color: #ffcc00; font-weight: bold; display: none;">⚠️ Stat Points Pending!</span>
        </div>
        <div class="stat-col" style="text-align: right; font-size: 0.9rem;">
            <strong>STR (Dmg):</strong> <span id="stat-str">10</span><br>
            <strong>DEF (Block):</strong> <span id="stat-def">5</span><br>
            <strong>INV:</strong> <span id="player-inv" style="font-size: 0.8rem; display:block; max-height:40px; overflow-y:auto;">ID Badge</span>
        </div>
    </div>

    <div class="combat-zone" id="enemy-panel">
        <div style="font-weight: bold; color: #ff3333; text-align: center;" id="combat-title">⚠️ HOSTILE ENTRANTS DETECTED</div>
        
        <div class="enemy-container">
            <div class="enemy-box" id="card-enemy1">
                <div id="name-enemy1">🤖 Droid</div>
                <pre id="sprite-enemy1">
  [o_o]  
  /[_]\=🔧
  _|_|_ 
                </pre>
                <div><strong>HP:</strong> <span id="hp-enemy1">35</span></div>
            </div>

            <div class="enemy-box" id="card-enemy2">
                <div id="name-enemy2">👽 Alien</div>
                <pre id="sprite-enemy2">
 _/\_/\_ 
( o.o )  
 > ^ <  
                </pre>
                <div><strong>HP:</strong> <span id="hp-enemy2">45</span></div>
            </div>
        </div>
    </div>

    <div class="story-text">
        <div id="story-box"></div>
        <div class="combat-log" id="log-box" style="display: none;"></div>
    </div>

    <div id="choices-box"></div>

    <script>
        let gameState = {
            player: { 
                hp: 80, 
                maxHp: 100,
                level: 1,
                exp: 0,
                nextLevelExp: 100,
                credits: 0,
                str: 10,  
                def: 5,   
                statPoints: 0,
                inventory: ["ID Badge"],
                currentWeapon: "Fists"
            },
            enemies: {
                enemy1: { key: 'enemy1', name: "", hp: 0, maxHp: 0, alive: false, dmg: 0, expReward: 0, creditReward: 0, defaultSprite: "" },
                enemy2: { key: 'enemy2', name: "", hp: 0, maxHp: 0, alive: false, dmg: 0, expReward: 0, creditReward: 0, defaultSprite: "" }
            },
            inCombat: false,
            combatSuccessScene: "crash_sequence",
            storyFlags: {
                hasReactorKey: false,
                starshipRepaired: false,
                artifactsFound: 0
            }
        };

        const enemyTemplates = {
            droid: { name: "Corrupted Droid", hp: 35, dmg: 8, expReward: 45, creditReward: 15, sprite: "  [o_o]  \n  /[_]\\=🔧\n  _|_|_ " },
            alien: { name: "Alien Stalker", hp: 45, dmg: 12, expReward: 65, creditReward: 25, sprite: " _/\\_/\\_ \n( o.o )  \n > ^ <  " },
            leech: { name: "Bio-Leech Swarm", hp: 25, dmg: 6, expReward: 35, creditReward: 12, sprite: " ~ ~ ~ \n  ~ ~ ~ \n ~ ~ ~ " },
            pirate: { name: "Scav Raider", hp: 60, dmg: 16, expReward: 90, creditReward: 50, sprite: "  p_o  \n /[_]\\=🔫\n  _ \\  " },
            sentinel: { name: "Precursor Drone", hp: 80, dmg: 20, expReward: 120, creditReward: 75, sprite: " 🧬==🧬 \n [⚡_⚡] \n  /  \\  " },
            behemoth: { name: "The Cyber-Amalgam", hp: 150, dmg: 28, expReward: 250, creditReward: 200, sprite: " /\\_🤖_/\\\n[x_o==o_x]\n /_/_|\\_\\ " }
        };

        const scenes = {
            // --- ACT I: THE ESCAPE & CRASH ---
            med_bay: {
                text: "You awaken on a cold medical bed, your head pounding. Red emergency lights pulse against the metal walls. The room is trashed. The heavy steel door is slightly ajar.",
                choices: [
                    { text: "🔍 Search the room for supplies", nextScene: "search_med_bay" },
                    { text: "🚪 Pry open the door and exit into the corridor", nextScene: "corridor_intro" }
                ]
            },
            search_med_bay: {
                text: "You quickly rummage through a tipped-over crash cart. Beneath some shattered vials, you find an emergency Scalpel and a small canister of Bio-Gel!",
                onEnter: () => {
                    if (!gameState.player.inventory.includes("Scalpel")) {
                        gameState.player.inventory.push("Scalpel", "Bio-Gel");
                        gameState.player.currentWeapon = "Scalpel";
                    }
                },
                choices: [
                    { text: "🚪 Step out into the flickering corridor", nextScene: "corridor_intro" }
                ]
            },
            corridor_intro: {
                text: "The main hallway is a zone of total chaos. Sparks shower from exposed wiring. A corrupted Maintenance Droid drags a heavy wrench nearby, while a sleek Alien Stalker clings to the ceiling above. They block your path!",
                choices: [
                    { text: "⚔️ Raise your hands and prepare for combat!", action: () => setupCombat("droid", "alien", "crash_sequence") }
                ]
            },
            crash_sequence: {
                text: "Suddenly, the floor buckles violently! A deafening roar echoes through the hull as the ship's automated pilot loses control. The hull breaks apart, and everything goes black as you plunge through an unknown atmosphere...",
                choices: [
                    { text: "🌀 Wake up in the wreckage...", nextScene: "crash_site" }
                ]
            },

            // --- ACT II: THE CRASH SITE (GROUND HUB) ---
            crash_site: {
                text: "You groan, pushing a piece of twisted hull plating off your chest. The ship has completely torn in half, crash-landing in an eerie graveyard of ancient mechanical trees.\n\nYou manage to drag the functional remaining survival module into a temporary Base Camp.",
                choices: [
                    { text: "⛺ Establish your Base Camp Hub", nextScene: "hub" }
                ]
            },
            hub: {
                text: () => `=== BASE CAMP HUB ===
Safe within the powered survival module, you can tend to your wounds, upgrade your stats, buy superior hardware, or venture out into hostile sectors.

🚀 Starship Repair Status: ${gameState.storyFlags.starshipRepaired ? "READY FOR ORBIT" : "MISSING HYPERDRIVE CORE"}`,
                onEnter: () => { gameState.player.hp = gameState.player.maxHp; },
                choices: [
                    { text: "🏋️ Level Up / Upgrade Attributes", nextScene: "hub_stats" },
                    { text: "🛒 Access Automated Replicator (Shop)", nextScene: "hub_shop" },
                    { text: "🌲 Sector 1: Infested Quarantine Woods", nextScene: "mission_quarantine" },
                    { text: "⚡ Sector 2: Broken Reactor Core", action: () => handleReactorCheck() },
                    { text: "🌌 Launch Starship into Orbit", action: () => handleOrbitCheck() }
                ]
            },
            hub_stats: {
                text: () => `=== ATTRIBUTE TRAINING ===
Available Stat Points: ${gameState.player.statPoints}

[STR] current: ${gameState.player.str} (Increases physical attack scaling)
[DEF] current: ${gameState.player.def} (Flat reduction to incoming enemy damage)`,
                choices: [
                    { text: "💪 Train Strength (+2 Damage, costs 1 Point)", action: () => upgradeStat("str", "hub_stats") },
                    { text: "🛡️ Train Defense (+1 Block, costs 1 Point)", action: () => upgradeStat("def", "hub_stats") },
                    { text: "↩️ Return to Hub Main Console", nextScene: "hub" }
                ]
            },
            hub_shop: {
                text: () => `=== REPLICATOR INTERFACE ===
Your Balance: 🪙${gameState.player.credits} Credits

1. Bio-Gel (Consumable, heals 25 HP) | Cost: 20 Credits
2. Heavy Plasma Torch (Weapon: +25 Base Dmg) | Cost: 75 Credits`,
                choices: [
                    { text: "🧪 Replicate Bio-Gel (20 Credits)", action: () => buyItem("Bio-Gel", 20, false, "hub_shop") },
                    { text: "🔥 Replicate Heavy Plasma Torch (75 Credits)", action: () => buyItem("Plasma Torch", 75, true, "hub_shop") },
                    { text: "↩️ Return to Hub Main Console", nextScene: "hub" }
                ]
            },

            // SECTOR 1 & 2 ACTIONS
            mission_quarantine: {
                text: "You venture deep into the twisted, overgrown crew quarters. Bio-luminescent spores drift through the air. Suddenly, small skittering sounds amplify from the ventilation grates. Leeching parasites drop down!",
                choices: [
                    { text: "⚔️ Fight off the parasites", action: () => setupCombat("leech", "leech", "clear_quarantine") }
                ]
            },
            clear_quarantine: {
                text: "You crush the remaining bio-leeches. Searching a pristine locker nearby, you discover an old rusted 'Reactor Security Override Key' and clean credits!",
                onEnter: () => {
                    gameState.player.credits += 40;
                    gameState.storyFlags.hasReactorKey = true;
                },
                choices: [
                    { text: "↩️ Fall back safely to Base Camp Hub", nextScene: "hub" }
                ]
            },
            mission_reactor_locked: {
                text: "🔒 ACCESS DENIED. The heavy blast doors leading to the Reactor Core require a 'Reactor Keycard'. Go clear Sector 1 (Quarantine Woods) first.",
                choices: [
                    { text: "↩️ Return to Base Camp Hub", nextScene: "hub" }
                ]
            },
            mission_reactor_run: {
                text: "You swipe the security bypass card. The massive heavy shield doors open. Lurking inside the automated core room is a dangerous Scav Raider attempting to steal parts!",
                choices: [
                    { text: "⚔️ Attack the Raider", action: () => setupCombat("pirate", "droid", "clear_reactor") }
                ]
            },
            clear_reactor: {
                text: "The Raider collapses. Behind their platform, you disconnect the pristine, glowing Hyperdrive Core! Your ship can fly again.",
                onEnter: () => {
                    gameState.storyFlags.starshipRepaired = true;
                    gameState.player.credits += 60;
                },
                choices: [
                    { text: "↩️ Return to Base Camp Hub with the Core", nextScene: "hub" }
                ]
            },
            orbit_failed: {
                text: "❌ IGNITION CRITICAL. The sub-light engines remain dead. You cannot break orbit without recovering the Hyperdrive Core from Sector 2 (Broken Reactor).",
                choices: [
                    { text: "↩️ Return to Base Camp Hub", nextScene: "hub" }
                ]
            },

            // --- ACT III: DEEP SPACE EXPANSION (NEW ORBITAL HUB) ---
            orbit_welcome: {
                text: "The engines roar to life! The survival module transforms into an atmospheric vessel, rocketing into the dark void. You dock with the massive derelict flagship orbiting the planet: The Starship Defiant.\n\nYou establish a new advanced commands terminal.",
                choices: [
                    { text: "🛰️ Enter Starship Command Hub", nextScene: "orbit_hub" }
                ]
            },
            orbit_hub: {
                text: () => `=== STARSHIP DEFIANT ORBITAL HUB ===
The view screen displays a massive deep-space rift. To pass through it, you require 2 Precursor Quantum Artifacts to calibrate your navigation shields.

🔮 Precursor Artifacts Found: ${gameState.storyFlags.artifactsFound} / 2`,
                onEnter: () => { gameState.player.hp = gameState.player.maxHp; }, 
                choices: [
                    { text: "🏋️ Level Up / Upgrade Attributes", nextScene: "hub_stats_orbit" },
                    { text: "🛰️ Access High-Tier Armory Replicator", nextScene: "orbit_shop" },
                    { text: "☄️ Drop Pod: Asteroid Belt Mining Base", nextScene: "mission_asteroid" },
                    { text: "🪐 Drop Pod: Sunken Precursor Temple", nextScene: "mission_temple" },
                    { text: "🌀 Enter the Cosmic Rift (Final Fight)", action: () => handleRiftCheck() }
                ]
            },
            hub_stats_orbit: {
                text: () => `=== ORBITAL ATTRIBUTE TRAINING ===\nAvailable Stat Points: ${gameState.player.statPoints}`,
                choices: [
                    { text: "💪 Train Strength (+2 Damage)", action: () => upgradeStat("str", "hub_stats_orbit") },
                    { text: "🛡️ Train Defense (+1 Block)", action: () => upgradeStat("def", "hub_stats_orbit") },
                    { text: "↩️ Return to Orbit Control Room", nextScene: "orbit_hub" }
                ]
            },
            orbit_shop: {
                text: () => `=== ARMORY ARMAMENT PRINTER ===
Your Balance: 🪙${gameState.player.credits} Credits

1. High-Frequency Laser Sabre (Weapon: +45 Base Dmg) | Cost: 150 Credits`,
                choices: [
                    { text: "⚔️ Print Laser Sabre (150 Credits)", action: () => buyItem("Laser Sabre", 150, true, "orbit_shop") },
                    { text: "↩️ Return to Orbit Control Room", nextScene: "orbit_hub" }
                ]
            },

            // SECTOR 3: ASTEROID MINING BASE
            mission_asteroid: {
                text: "Your drop pod lands inside a zero-gravity asteroid hangar. The automated defensive framework has gone completely rogue! Precursor Drones fire energy bolts at you.",
                choices: [
                    { text: "⚔️ Engage Defense Drones", action: () => setupCombat("sentinel", "droid", "clear_asteroid") }
                ]
            },
            clear_asteroid: {
                text: "The drones explode in static bursts. Floating inside a secure vault container, you secure the 1st Quantum Artifact!",
                onEnter: () => {
                    if (gameState.storyFlags.artifactsFound < 1) gameState.storyFlags.artifactsFound = 1;
                    gameState.player.credits += 100;
                },
                choices: [
                    { text: "↩️ Fly Pod back to Starship Defiant", nextScene: "orbit_hub" }
                ]
            },

            // SECTOR 4: PRECURSOR TEMPLE
            mission_temple: {
                text: "You step out into a crumbling, pressurized temple submerged in toxic methane oceans. Ancient sentinels emerge from liquid-metal chambers to purify the intruder!",
                choices: [
                    { text: "⚔️ Fight Temple Sentinels", action: () => setupCombat("sentinel", "sentinel", "clear_temple") }
                ]
            },
            clear_temple: {
                text: "The mechanical bodies melt away. Resting on an obsidian altar, you break free the 2nd Quantum Artifact!",
                onEnter: () => {
                    if (gameState.storyFlags.artifactsFound < 2) gameState.storyFlags.artifactsFound = 2;
                    gameState.player.credits += 100;
                },
                choices: [
                    { text: "↩️ Fly Pod back to Starship Defiant", nextScene: "orbit_hub" }
                ]
            },

            final_boss_locked: {
                text: "⚠️ WARNING. Your ship's deflector shields cannot survive the spatial gravity of the rift without both Quantum Artifacts. Explore the Asteroid Belt and the Sunken Temple first.",
                choices: [
                    { text: "↩️ Return to Orbit Control Room", nextScene: "orbit_hub" }
                ]
            },
            final_boss_intro: {
                text: "The artifacts hum with energy, opening a safe localized corridor inside the roaring cosmic tear. But standing at the epicenter of the rift is the absolute core consciousness—the monstrous Cyber-Amalgam Behemoth! Defeat it to win your freedom!",
                choices: [
                    { text: "🚨 ENGAGE FINAL BOSS PROTOCOL 🚨", action: () => setupCombat("behemoth", "sentinel", "victory_ending") }
                ]
            },

            // --- GAME COMPLETE ENDING ---
            victory_ending: {
                text: "With a blind light explosion, the Cyber-Amalgam shatters. The rift completely stabilizes, establishing an uninhibited slipspace pathway straight to civilized planetary space.\n\n🎉 CONGRATULATIONS! YOU HAVE COMPLETED SPACE SALVAGER EX! 🎉\nYou mastered attributes, built a space-faring engine loop, and successfully escaped the system!",
                choices: [
                    { text: "🔄 Play Again (Restart Simulation)", action: () => location.reload() }
                ]
            }
        };

        // --- EXPLICIT CONDITIONAL ROUTERS ---

        function handleReactorCheck() {
            if (gameState.storyFlags.hasReactorKey) {
                renderScene("mission_reactor_run");
            } else {
                renderScene("mission_reactor_locked");
            }
        }

        function handleOrbitCheck() {
            if (gameState.storyFlags.starshipRepaired) {
                renderScene("orbit_welcome");
            } else {
                renderScene("orbit_failed");
            }
        }

        function handleRiftCheck() {
            if (gameState.storyFlags.artifactsFound >= 2) {
                renderScene("final_boss_intro");
            } else {
                renderScene("final_boss_locked");
            }
        }

        // --- CORE GAME ENGINE ---

        function renderScene(sceneId) {
            const scene = scenes[sceneId];
            
            if (scene.onEnter) scene.onEnter();
            updateUI();

            if (typeof scene.text === "function") {
                document.getElementById("story-box").innerText = scene.text();
            } else {
                document.getElementById("story-box").innerText = scene.text;
            }

            const choicesBox = document.getElementById("choices-box");
            choicesBox.innerHTML = "";

            scene.choices.forEach(choice => {
                const button = document.createElement("button");
                button.className = "btn";
                button.innerText = choice.text;
                if (choice.nextScene) {
                    button.onclick = () => renderScene(choice.nextScene);
                } else if (choice.action) {
                    button.onclick = choice.action;
                }
                choicesBox.appendChild(button);
            });
        }

        function updateUI() {
            document.getElementById("player-hp").innerText = gameState.player.hp;
            document.getElementById("player-max-hp").innerText = gameState.player.maxHp;
            document.getElementById("player-lvl").innerText = gameState.player.level;
            document.getElementById("player-exp").innerText = gameState.player.exp;
            document.getElementById("player-next-exp").innerText = gameState.player.nextLevelExp;
            document.getElementById("player-credits").innerText = gameState.player.credits;
            document.getElementById("player-inv").innerText = gameState.player.inventory.join(", ");
            document.getElementById("player-weapon").innerText = gameState.player.currentWeapon;
            
            document.getElementById("stat-str").innerText = gameState.player.str;
            document.getElementById("stat-def").innerText = gameState.player.def;

            if (gameState.player.statPoints > 0 && !gameState.inCombat) {
                document.getElementById("stat-points-alert").style.display = "inline";
            } else {
                document.getElementById("stat-points-alert").style.display = "none";
            }
        }

        function gainExp(amount) {
            let logAddon = ` Gained ${amount} EXP.`;
            gameState.player.exp += amount;

            if (gameState.player.exp >= gameState.player.nextLevelExp) {
                gameState.player.exp -= gameState.player.nextLevelExp;
                gameState.player.level += 1;
                gameState.player.maxHp += 15; 
                gameState.player.hp = gameState.player.maxHp; 
                gameState.player.statPoints += 1; 
                
                logAddon += `<br><span style='color: #00ff66; font-weight: bold;'>🎉 LEVEL UP! You reached Level ${gameState.player.level}! +1 Point gained!</span>`;
            }
            return logAddon;
        }

        function upgradeStat(statKey, returnScene) {
            if (gameState.player.statPoints > 0) {
                gameState.player.statPoints--;
                if (statKey === "str") gameState.player.str += 2;
                if (statKey === "def") gameState.player.def += 1;
                renderScene(returnScene);
            }
        }

        function buyItem(itemName, cost, isWeapon, returnScene) {
            if (gameState.player.credits >= cost) {
                if (isWeapon && gameState.player.inventory.includes(itemName)) {
                    alert("Weapon system architecture already printed!");
                    return;
                }
                gameState.player.credits -= cost;
                gameState.player.inventory.push(itemName);
                if (isWeapon) gameState.player.currentWeapon = itemName;
                renderScene(returnScene);
            } else {
                alert("Insufficient digital credits available!");
            }
        }

        function setupCombat(enemyKey1, enemyKey2, successScene) {
            gameState.inCombat = true;
            gameState.combatSuccessScene = successScene;

            let e1 = enemyTemplates[enemyKey1];
            gameState.enemies.enemy1 = { key: 'enemy1', name: e1.name, hp: e1.hp, maxHp: e1.hp, alive: true, dmg: e1.dmg, expReward: e1.expReward, creditReward: e1.creditReward, defaultSprite: e1.sprite };
            
            let e2 = enemyTemplates[enemyKey2];
            gameState.enemies.enemy2 = { key: 'enemy2', name: e2.name, hp: e2.hp, maxHp: e2.hp, alive: true, dmg: e2.dmg, expReward: e2.expReward, creditReward: e2.creditReward, defaultSprite: e2.sprite };

            document.getElementById("name-enemy1").innerText = gameState.enemies.enemy1.name;
            document.getElementById("hp-enemy1").innerText = gameState.enemies.enemy1.hp;
            document.getElementById("sprite-enemy1").innerText = gameState.enemies.enemy1.defaultSprite;
            document.getElementById("card-enemy1").style.opacity = "1";

            document.getElementById("name-enemy2").innerText = gameState.enemies.enemy2.name;
            document.getElementById("hp-enemy2").innerText = gameState.enemies.enemy2.hp;
            document.getElementById("sprite-enemy2").innerText = gameState.enemies.enemy2.defaultSprite;
            document.getElementById("card-enemy2").style.opacity = "1";

            document.getElementById("enemy-panel").style.display = "block";
            document.getElementById("log-box").style.display = "block";
            document.getElementById("log-box").innerHTML = "<em>Combat initiated. Fire at will!</em>";
            
            generateCombatChoices();
        }

        function generateCombatChoices() {
            const choicesBox = document.getElementById("choices-box");
            choicesBox.innerHTML = "";

            if (gameState.player.hp <= 0) {
                document.getElementById("story-box").innerText = "🚨 GAME OVER. Your journey ends here among the stars.";
                const restartBtn = document.createElement("button");
                restartBtn.className = "btn";
                restartBtn.innerText = "Restart Simulation";
                restartBtn.onclick = () => location.reload();
                choicesBox.appendChild(restartBtn);
                return;
            }

            if (!gameState.enemies.enemy1.alive && !gameState.enemies.enemy2.alive) {
                gameState.inCombat = false;
                document.getElementById("enemy-panel").style.display = "none";
                renderScene(gameState.combatSuccessScene);
                return;
            }

            if (gameState.enemies.enemy1.alive) {
                const btn = document.createElement("button");
                btn.className = "btn btn-combat";
                btn.innerText = `💥 Attack ${gameState.enemies.enemy1.name}`;
                btn.onclick = () => executeTurn("enemy1");
                choicesBox.appendChild(btn);
            }

            if (gameState.enemies.enemy2.alive) {
                const btn = document.createElement("button");
                btn.className = "btn btn-combat";
                btn.innerText = `💥 Attack ${gameState.enemies.enemy2.name}`;
                btn.onclick = () => executeTurn("enemy2");
                choicesBox.appendChild(btn);
            }

            if (gameState.player.inventory.includes("Bio-Gel")) {
                const btn = document.createElement("button");
                btn.className = "btn";
                btn.innerText = "🧪 Consume Bio-Gel (+25 HP)";
                btn.onclick = () => useItemInCombat();
                choicesBox.appendChild(btn);
            }
        }

        function executeTurn(targetKey) {
            let log = "";
            let baseWeaponDmg = 5;
            
            if (gameState.player.currentWeapon === "Scalpel") baseWeaponDmg = 12;
            if (gameState.player.currentWeapon === "Plasma Torch") baseWeaponDmg = 25;
            if (gameState.player.currentWeapon === "Laser Sabre") baseWeaponDmg = 45;

            let totalPlayerDmg = baseWeaponDmg + Math.floor(gameState.player.str / 2);

            let target = gameState.enemies[targetKey];
            target.hp -= totalPlayerDmg;
            log += `You strike ${target.name} for ${totalPlayerDmg} damage.<br>`;

            if (target.hp <= 0) {
                target.hp = 0;
                target.alive = false;
                log += `✨ <strong>${target.name} has been destroyed!</strong>`;
                log += gainExp(target.expReward);
                gameState.player.credits += target.creditReward;
                log += ` Gained 🪙${target.creditReward} credits.<br>`;
                
                document.getElementById(`card-${targetKey}`).style.opacity = "0.2";
                document.getElementById(`sprite-${targetKey}`).innerText = "\n  *DEFEATED* \n  x__x \n";
            }

            log += "<span style='color: #ff3333;'>";
            ['enemy1', 'enemy2'].forEach(key => {
                let enemy = gameState.enemies[key];
                if (enemy.alive) {
                    let netEnemyDmg = Math.max(1, enemy.dmg - Math.floor(gameState.player.def / 2));
                    gameState.player.hp -= netEnemyDmg;
                    log += `• ${enemy.name} strikes back for ${netEnemyDmg} dmg (Blocked ${Math.floor(gameState.player.def / 2)}).<br>`;
                }
            });
            log += "</span>";

            if (gameState.player.hp <= 0) gameState.player.hp = 0;

            document.getElementById("log-box").innerHTML = log;
            updateUI();
            generateCombatChoices();
        }

        function useItemInCombat() {
            gameState.player.hp = Math.min(gameState.player.hp + 25, gameState.player.maxHp);
            const index = gameState.player.inventory.indexOf("Bio-Gel");
            if (index > -1) gameState.player.inventory.splice(index, 1);
            
            let log = "You use Bio-Gel and heal (+25 HP).<br>";
            log += "<span style='color: #ff3333;'>";
            ['enemy1', 'enemy2'].forEach(key => {
                let enemy = gameState.enemies[key];
                if (enemy.alive) {
                    let netEnemyDmg = Math.max(1, enemy.dmg - Math.floor(gameState.player.def / 2));
                    gameState.player.hp -= netEnemyDmg;
                    log += `• ${enemy.name} hits you for ${netEnemyDmg} dmg.<br>`;
                }
            });
            log += "</span>";

            if (gameState.player.hp <= 0) gameState.player.hp = 0;

            document.getElementById("log-box").innerHTML = log;
            updateUI();
            generateCombatChoices();
        }

        renderScene("med_bay");
    </script>
</body>
</html>
