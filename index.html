<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Space Salvager - Deep Void Infinite Edition</title>
    <style>
        body {
            background-color: #121214;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            max-width: 750px;
            margin: 0 auto;
        }
        .stats-panel {
            border: 1px solid #00ff66;
            padding: 12px;
            margin-bottom: 20px;
            background-color: #1a1a1e;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .stat-col {
            flex: 1;
        }
        .combat-zone {
            background: #251111;
            border: 1px solid #ff3333;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
        }
        .enemy-container {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
        }
        .enemy-box {
            text-align: center;
            border: 1px dashed #ff3333;
            padding: 10px;
            width: 45%;
        }
        pre {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            line-height: 1.1;
            margin: 10px 0;
            color: #ff3333;
            background: #150808;
            padding: 5px;
            border-radius: 4px;
        }
        .hero-pre {
            color: #00ff66;
            background: none;
            margin: 0;
            padding: 0;
            font-size: 0.75rem;
        }
        .story-text {
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 25px;
            min-height: 140px;
            white-space: pre-line;
        }
        .combat-log {
            color: #ffcc00;
            font-size: 0.95rem;
            margin-top: 15px;
            border-top: 1px solid #ffcc00;
            padding-top: 10px;
            max-height: 120px;
            overflow-y: auto;
        }
        .btn {
            display: block;
            width: 100%;
            background: #1a1a1e;
            color: #00ff66;
            border: 1px solid #00ff66;
            padding: 12px;
            margin-bottom: 10px;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            text-align: left;
        }
        .btn:hover {
            background: #00ff66;
            color: #121214;
        }
        .btn-combat {
            border-color: #ff3333;
            color: #ff3333;
        }
        .btn-combat:hover {
            background: #ff3333;
            color: #121214;
        }
        .btn-magic {
            border-color: #3399ff;
            color: #3399ff;
        }
        .btn-magic:hover {
            background: #3399ff;
            color: #121214;
        }
    </style>
</head>
<body>

    <div class="stats-panel">
        <div class="stat-col">
<pre class="hero-pre">
 O 
/|\  [<span id="player-weapon">Unarmed</span>]
/ \  
</pre>
            <strong>HP:</strong> <span id="player-hp">100</span>/<span id="player-max-hp">100</span><br>
            <strong>MP:</strong> <span id="player-mp">20</span>/<span id="player-max-mp">20</span><br>
            <strong>CREDITS:</strong> 🪙<span id="player-credits">0</span>
        </div>
        <div class="stat-col" style="text-align: center;">
            <strong>LVL:</strong> <span id="player-lvl">1</span> (<span id="loop-count">Loop 1</span>)<br>
            <strong>EXP:</strong> <span id="player-exp">0</span> / <span id="player-next-exp">100</span><br>
            <span id="stat-points-alert" style="color: #ffcc00; font-weight: bold; display: none;">⚠️ Stat Points Pending!</span>
        </div>
        <div class="stat-col" style="text-align: right; font-size: 0.9rem;">
            <strong>STR (Dmg):</strong> <span id="stat-str">10</span><br>
            <strong>DEF (Block):</strong> <span id="stat-def">5</span><br>
            <strong>INV:</strong> <span id="player-inv" style="font-size: 0.8rem; display:block; max-height:40px; overflow-y:auto;">ID Badge</span>
        </div>
    </div>

    <div class="combat-zone" id="enemy-panel">
        <div style="font-weight: bold; color: #ff3333; text-align: center;" id="combat-title">⚠️ HOSTILE ENTRANTS DETECTED</div>
        
        <div class="enemy-container">
            <div class="enemy-box" id="card-enemy1">
                <div id="name-enemy1">🤖 Enemy 1</div>
                <pre id="sprite-enemy1">...</pre>
                <div><strong>HP:</strong> <span id="hp-enemy1">0</span></div>
            </div>

            <div class="enemy-box" id="card-enemy2">
                <div id="name-enemy2">👽 Enemy 2</div>
                <pre id="sprite-enemy2">...</pre>
                <!-- FIXED BUG BELOW: Changed from hp-enemy1 to hp-enemy2 -->
                <div><strong>HP:</strong> <span id="hp-enemy2">0</span></div>
            </div>
        </div>
    </div>

    <div class="story-text">
        <div id="story-box"></div>
        <div class="combat-log" id="log-box" style="display: none;"></div>
    </div>

    <div id="choices-box"></div>

    <script>
        let gameState = {
            player: { 
                hp: 100, 
                maxHp: 100,
                mp: 20,
                maxMp: 20,
                level: 1,
                exp: 0,
                nextLevelExp: 100,
                credits: 20,
                str: 10,  
                def: 5,   
                statPoints: 0,
                inventory: ["ID Badge"],
                currentWeapon: "Fists",
                weaponBonus: 0
            },
            enemies: {
                enemy1: { key: 'enemy1', name: "", hp: 0, maxHp: 0, alive: false, dmg: 0, expReward: 0, creditReward: 0, defaultSprite: "" },
                enemy2: { key: 'enemy2', name: "", hp: 0, maxHp: 0, alive: false, dmg: 0, expReward: 0, creditReward: 0, defaultSprite: "" }
            },
            inCombat: false,
            combatSuccessScene: "hub",
            loop: 1,
            currentSector: 1,
            sectorFloor: 0,
            maxFloors: 5,
            storyFlags: {
                hasReactorKey: false,
                starshipRepaired: false,
                artifactsFound: 0
            }
        };

        const weaponsData = {
            "Fists": { name: "Fists", dmg: 5, cost: 0 },
            "Scalpel": { name: "Scalpel", dmg: 14, cost: 0 },
            "Plasma Torch": { name: "Plasma Torch", dmg: 32, cost: 75 },
            "Laser Sabre": { name: "Laser Sabre", dmg: 65, cost: 180 },
            "Void Disrupter": { name: "Void Disrupter", dmg: 120, cost: 400 }
        };

        const enemyPool = {
            1: [ // Sector 1
                { name: "Corrupted Droid", hp: 35, dmg: 8, exp: 35, credits: 15, sprite: "  [o_o]  \n  /[_]\\=🔧\n  _|_|_ " },
                { name: "Alien Stalker", hp: 45, dmg: 12, exp: 45, credits: 20, sprite: " _/\\_/\\_ \n( o.o )  \n > ^ <  " },
                { name: "Bio-Leech Swarm", hp: 25, dmg: 6, exp: 25, credits: 12, sprite: " ~ ~ ~ \n  ~ ~ ~ \n ~ ~ ~ " }
            ],
            2: [ // Sector 2
                { name: "Scav Raider", hp: 70, dmg: 18, exp: 65, credits: 35, sprite: "  p_o  \n /[_]\\=🔫\n  _ \\  " },
                { name: "Heavy Sentry Mech", hp: 95, dmg: 22, exp: 80, credits: 45, sprite: "  /███\\  \n ⚙️[O_O]⚙️ \n  /_|_\\  " },
                { name: "Spliced Hound", hp: 55, dmg: 16, exp: 50, credits: 25, sprite: " ^..^_____/\n (oo)     \\\n  W--W----W" }
            ],
            3: [ // Sector 3
                { name: "Precursor Drone", hp: 130, dmg: 32, exp: 120, credits: 60, sprite: " 🧬==🧬 \n [⚡_⚡] \n  /  \\  " },
                { name: "Rift Horrorglow", hp: 160, dmg: 38, exp: 150, credits: 80, sprite: " 🌀o_o🌀 \n <(▓▓)> \n  /    \\ " },
                { name: "Void Executioner", hp: 220, dmg: 48, exp: 250, credits: 150, sprite: "  /☠️\\  \n ░░[█]░░=⚔️\n  /_ _\\ " }
            ]
        };

        const bossPool = {
            1: { name: "The Root-Matrix Overseer", hp: 120, dmg: 20, exp: 150, credits: 100, sprite: "  /🌳🌳\\\n [👁️__👁️]\n/_/_|_\\_\\" },
            2: { name: "Core Meltdown Behemoth", hp: 250, dmg: 36, exp: 300, credits: 200, sprite: " /\\_🤖_/\\\n[x_o==o_x]\n /_/_|\\_\\ " },
            3: { name: "The Cyber-Amalgam World-Eater", hp: 600, dmg: 70, exp: 1000, credits: 500, sprite: " 🌌==[☠️]==🌌\n[█████████]\n 🌀/_/|\\_\\🌀" }
        };

        const scenes = {
            med_bay: {
                text: "You awaken on a cold medical bed, your head pounding. Red emergency lights pulse against the metal walls. The room is trashed. The heavy steel door is slightly ajar.",
                choices: [
                    { text: "🔍 Search the room for supplies", nextScene: "search_med_bay" },
                    { text: "🚪 Pry open the door and exit into the corridor", nextScene: "corridor_intro" }
                ]
            },
            search_med_bay: {
                text: "You quickly rummage through a tipped-over crash cart. Beneath some shattered vials, you find an emergency Scalpel and a small canister of Bio-Gel!",
                onEnter: () => {
                    if (!gameState.player.inventory.includes("Scalpel")) {
                        gameState.player.inventory.push("Scalpel", "Bio-Gel");
                        autoEquipBestWeapon();
                    }
                },
                choices: [
                    { text: "🚪 Step out into the flickering corridor", nextScene: "corridor_intro" }
                ]
            },
            corridor_intro: {
                text: "The main hallway is a zone of total chaos. Sparks shower from exposed wiring. A corrupted Maintenance Droid drags a heavy wrench nearby, while a sleek Alien Stalker clings to the ceiling above. They block your path!",
                choices: [
                    { text: "⚔️ Raise your hands and prepare for combat!", action: () => setupFixedIntroFight() }
                ]
            },
            crash_sequence: {
                text: "Suddenly, the floor buckles violently! A deafening roar echoes through the hull as the ship's automated pilot loses control. The hull breaks apart, and everything goes black as you plunge through an unknown atmosphere...",
                choices: [
                    { text: "🌀 Wake up in the wreckage...", nextScene: "hub" }
                ]
            },

            // MAIN PROGRESSION HUB (GROUND & ORBIT SATELLITES)
            hub: {
                text: () => {
                    if (gameState.currentSector < 3) {
                        return `=== BASE CAMP HUB (Loop: ${gameState.loop}) ===\nYou are hunkered down in the functional remains of the crash wreckage. To escape this planet, you must assemble resources from local sectors.\n\n🛠️ Engine Progress: ${gameState.storyFlags.starshipRepaired ? "READY FOR LIFT-OFF" : "MISSING REGULATOR CORES (" + (gameState.storyFlags.hasReactorKey ? "1/2" : "0/2") + ")"}`;
                    } else {
                        return `=== STARSHIP DEFIANT: COMMAND HUB (Loop: ${gameState.loop}) ===\nYou have successfully broken atmosphere and docked with the orbiting cruiser. Ahead lies the expanding cosmic breach.\n\n🔮 Quantum Gate Alignment: ${gameState.storyFlags.artifactsFound} / 2 Artifacts Calibrated`;
                    }
                },
                onEnter: () => { 
                    gameState.player.hp = gameState.player.maxHp; 
                    gameState.player.mp = gameState.player.maxMp; 
                },
                choices: [
                    { text: "🏋️ Attribute Training Center", nextScene: "hub_stats" },
                    { text: "🛒 Access Replicator Printer (Shop)", nextScene: "hub_shop" },
                    { text: "🚀 Deploy Expedition Mission Vector", action: () => openExpeditionMenu() }
                ]
            },

            hub_stats: {
                text: () => `=== ATTRIBUTE TRAINING ===\nAvailable Stat Points: ${gameState.player.statPoints}\n\n[STR] current: ${gameState.player.str} (Increases strike scaling formulas)\n[DEF] current: ${gameState.player.def} (Reduces flat damage metrics)`,
                choices: [
                    { text: "💪 Upgrade Strength (+2 Dmg, costs 1 Pt)", action: () => upgradeStat("str") },
                    { text: "🛡️ Upgrade Defense (+1 Block, costs 1 Pt)", action: () => upgradeStat("def") },
                    { text: "↩️ Return to Main Console Hub", nextScene: "hub" }
                ]
            },

            hub_shop: {
                text: () => `=== INDUSTRIAL REPLICATOR PRINTER ===\nAvailable Balance: 🪙${gameState.player.credits} Credits\n\nSelect a blueprints matrix to assemble structure:`,
                choices: [
                    { text: "🧪 Print Bio-Gel Array (20 Credits)", action: () => buyConsumable("Bio-Gel", 20) },
                    { text: "🩹 Print Scalpel Blade Blueprint (Free Check)", action: () => buyWeapon("Scalpel") },
                    { text: "🔥 Print Heavy Plasma Torch (75 Credits)", action: () => buyWeapon("Plasma Torch") },
                    { text: "⚔️ Print High-Freq Laser Sabre (180 Credits)", action: () => buyWeapon("Laser Sabre") },
                    { text: "🌀 Print Void Disrupter Battery (400 Credits)", action: () => buyWeapon("Void Disrupter") },
                    { text: "↩️ Return to Main Console Hub", nextScene: "hub" }
                ]
            },

            // EXPEDITION MODAL SCENES
            expedition_select: {
                text: "Select a high-threat coordinate profile to drop into. Deep extraction generates multi-tier layout floors with a structural Sector Boss guarding the payload at the final coordinate floor.",
                choices: [] // Generated dynamically
            },

            floor_clear_intermission: {
                text: () => `=== SEGMENT CONCLUDED ===\nFloor ${gameState.sectorFloor} of ${gameState.maxFloors} successfully secured.\nYour thermal logs register shifting energies deeper within. Do you push forward or execute a tactical fallback retreat to basecamp?`,
                choices: [
                    { text: "⚡ Descend to next extraction grid floor", action: () => executeNextFloor() },
                    { text: "↩️ Evac to Hub (Keep credits, resets sector progression)", nextScene: "hub" }
                ]
            },

            sector_complete_scene: {
                text: () => `=== TARGET SECTOR ANNIHILATED ===\nThe sector boss structure has collapsed. You scan the debris field and harvest critical progression artifacts!`,
                onEnter: () => {
                    if (gameState.currentSector === 1 && !gameState.storyFlags.hasReactorKey) {
                        gameState.storyFlags.hasReactorKey = true;
                    } else if (gameState.currentSector === 2 && !gameState.storyFlags.starshipRepaired) {
                        gameState.storyFlags.starshipRepaired = true;
                        gameState.currentSector = 3; 
                    } else if (gameState.currentSector === 3) {
                        gameState.storyFlags.artifactsFound++;
                    }
                },
                choices: [
                    { text: "↩️ Return Victorious to Hub Terminal", action: () => checkGameLoopProgression() }
                ]
            }
        };

        // --- AUTOMATIC WEAPON EVALUATION ENGINE ---
        function autoEquipBestWeapon() {
            let bestWeapon = "Fists";
            let maxDmg = 0;

            gameState.player.inventory.forEach(item => {
                if (weaponsData[item]) {
                    if (weaponsData[item].dmg > maxDmg) {
                        maxDmg = weaponsData[item].dmg;
                        bestWeapon = item;
                    }
                }
            });

            gameState.player.currentWeapon = bestWeapon;
        }

        // --- PROCEDURAL GENERATOR LOOPS ---

        function openExpeditionMenu() {
            let scene = scenes.expedition_select;
            scene.choices = [];

            if (gameState.currentSector === 1) {
                scene.choices.push({ text: "🌲 Enter Sector 1: Infested Quarantine Woods (5 Floors)", action: () => initiateSectorRun(1, 5) });
            }
            if (gameState.currentSector === 2 || gameState.storyFlags.hasReactorKey) {
                scene.choices.push({ text: "⚡ Enter Sector 2: Broken Reactor Matrix (5 Floors)", action: () => initiateSectorRun(2, 5) });
            }
            if (gameState.currentSector === 3) {
                scene.choices.push({ text: "☄️ Drop Pod: Outer Asteroid Hangar Belt (5 Floors)", action: () => initiateSectorRun(3, 5) });
                scene.choices.push({ text: "🪐 Drop Pod: Sunken Void temple Grid (5 Floors)", action: () => initiateSectorRun(3, 5) });
            }

            scene.choices.push({ text: "↩️ Abort Deployment Protocol", nextScene: "hub" });
            renderScene("expedition_select");
        }

        function initiateSectorRun(sectorId, totalFloors) {
            gameState.currentSector = sectorId;
            gameState.sectorFloor = 1;
            gameState.maxFloors = totalFloors;
            generateProceduralFloor();
        }

        function generateProceduralFloor() {
            gameState.inCombat = true;
            gameState.combatSuccessScene = "floor_clear_intermission";

            if (gameState.sectorFloor >= gameState.maxFloors) {
                let bossData = bossPool[gameState.currentSector];
                let loopMultiplier = 1 + (gameState.loop - 1) * 0.5;

                gameState.enemies.enemy1 = {
                    key: 'enemy1',
                    name: `[BOSS] ${bossData.name}`,
                    hp: Math.floor(bossData.hp * loopMultiplier),
                    maxHp: Math.floor(bossData.hp * loopMultiplier),
                    alive: true,
                    dmg: Math.floor(bossData.dmg * loopMultiplier),
                    expReward: bossData.exp * gameState.loop,
                    creditReward: bossData.credits * gameState.loop,
                    defaultSprite: bossData.sprite
                };
                gameState.enemies.enemy2 = { key: 'enemy2', name: "", hp: 0, maxHp: 0, alive: false, dmg: 0, expReward: 0, creditReward: 0, defaultSprite: "" };
                gameState.combatSuccessScene = "sector_complete_scene";
                
                triggerCombatRender("[CRITICAL BOSS SIGNATURE DETECTED]");
            } else {
                let pool = enemyPool[gameState.currentSector];
                let loopMultiplier = 1 + (gameState.loop - 1) * 0.4;
                let floorMultiplier = 1 + (gameState.sectorFloor - 1) * 0.15;

                let e1Data = pool[Math.floor(Math.random() * pool.length)];
                let e2Data = pool[Math.floor(Math.random() * pool.length)];

                gameState.enemies.enemy1 = {
                    key: 'enemy1', name: `${e1Data.name} v${gameState.sectorFloor}`,
                    hp: Math.floor(e1Data.hp * loopMultiplier * floorMultiplier),
                    maxHp: Math.floor(e1Data.hp * loopMultiplier * floorMultiplier),
                    alive: true, dmg: Math.floor(e1Data.dmg * loopMultiplier * floorMultiplier),
                    expReward: Math.floor(e1Data.exp * floorMultiplier), creditReward: Math.floor(e1Data.credits * floorMultiplier),
                    defaultSprite: e1Data.sprite
                };

                gameState.enemies.enemy2 = {
                    key: 'enemy2', name: `${e2Data.name} v${gameState.sectorFloor}`,
                    hp: Math.floor(e2Data.hp * loopMultiplier * floorMultiplier),
                    maxHp: Math.floor(e2Data.hp * loopMultiplier * floorMultiplier),
                    alive: true, dmg: Math.floor(e2Data.dmg * loopMultiplier * floorMultiplier),
                    expReward: Math.floor(e2Data.exp * floorMultiplier), creditReward: Math.floor(e2Data.credits * floorMultiplier),
                    defaultSprite: e2Data.sprite
                };

                triggerCombatRender(`[GRID EXTRACTION: FLOOR ${gameState.sectorFloor}/${gameState.maxFloors}]`);
            }
        }

        function executeNextFloor() {
            gameState.sectorFloor++;
            generateProceduralFloor();
        }

        function checkGameLoopProgression() {
            if (gameState.storyFlags.artifactsFound >= 2) {
                gameState.loop++;
                gameState.storyFlags.artifactsFound = 0;
                gameState.storyFlags.hasReactorKey = false;
                gameState.storyFlags.starshipRepaired = false;
                gameState.currentSector = 1;
                
                alert(`🌌 COSMIC RIFT CRACKED!\nYour structural composition shifts as you ascend into Paradox Loop ${gameState.loop}!\nEnemies have evolved with enhanced threat modifiers.`);
            }
            renderScene("hub");
        }

        // --- CORE LOGIC ENGINE ---

        function setupFixedIntroFight() {
            gameState.inCombat = true;
            gameState.combatSuccessScene = "crash_sequence";
            let pool = enemyPool[1];
            gameState.enemies.enemy1 = { key: 'enemy1', name: pool[0].name, hp: pool[0].hp, maxHp: pool[0].hp, alive: true, dmg: pool[0].dmg, expReward: pool[0].exp, creditReward: pool[0].credits, defaultSprite: pool[0].sprite };
            gameState.enemies.enemy2 = { key: 'enemy2', name: pool[1].name, hp: pool[1].hp, maxHp: pool[1].hp, alive: true, dmg: pool[1].dmg, expReward: pool[1].exp, creditReward: pool[1].credits, defaultSprite: pool[1].sprite };
            triggerCombatRender("⚠️ HOSTILE ENTRANTS DETECTED");
        }

        function triggerCombatRender(title) {
            document.getElementById("combat-title").innerText = title;
            document.getElementById("name-enemy1").innerText = gameState.enemies.enemy1.name || "N/A";
            document.getElementById("hp-enemy1").innerText = gameState.enemies.enemy1.hp;
            document.getElementById("sprite-enemy1").innerText = gameState.enemies.enemy1.defaultSprite || "";
            document.getElementById("card-enemy1").style.opacity = gameState.enemies.enemy1.alive ? "1" : "0.2";

            document.getElementById("name-enemy2").innerText = gameState.enemies.enemy2.name || "N/A";
            document.getElementById("hp-enemy2").innerText = gameState.enemies.enemy2.hp;
            document.getElementById("sprite-enemy2").innerText = gameState.enemies.enemy2.defaultSprite || "";
            document.getElementById("card-enemy2").style.opacity = gameState.enemies.enemy2.alive ? "1" : "0.2";

            document.getElementById("enemy-panel").style.display = "block";
            document.getElementById("log-box").style.display = "block";
            document.getElementById("log-box").innerHTML = "<em>Sensors online. Combat protocols initialized...</em>";
            generateCombatChoices();
        }

        function renderScene(sceneId) {
            const scene = scenes[sceneId];
            if (scene.onEnter) scene.onEnter();
            updateUI();

            if (typeof scene.text === "function") {
                document.getElementById("story-box").innerText = scene.text();
            } else {
                document.getElementById("story-box").innerText = scene.text;
            }

            const choicesBox = document.getElementById("choices-box");
            choicesBox.innerHTML = "";

            scene.choices.forEach(choice => {
                const button = document.createElement("button");
                button.className = "btn";
                button.innerText = choice.text;
                if (choice.nextScene) {
                    button.onclick = () => renderScene(choice.nextScene);
                } else if (choice.action) {
                    button.onclick = choice.action;
                }
                choicesBox.appendChild(button);
            });
        }

        function updateUI() {
            document.getElementById("player-hp").innerText = gameState.player.hp;
            document.getElementById("player-max-hp").innerText = gameState.player.maxHp;
            document.getElementById("player-mp").innerText = gameState.player.mp;
            document.getElementById("player-max-mp").innerText = gameState.player.maxMp;
            document.getElementById("player-lvl").innerText = gameState.player.level;
            document.getElementById("player-exp").innerText = gameState.player.exp;
            document.getElementById("player-next-exp").innerText = gameState.player.nextLevelExp;
            document.getElementById("player-credits").innerText = gameState.player.credits;
            document.getElementById("player-inv").innerText = gameState.player.inventory.join(", ");
            document.getElementById("player-weapon").innerText = gameState.player.currentWeapon;
            document.getElementById("stat-str").innerText = gameState.player.str;
            document.getElementById("stat-def").innerText = gameState.player.def;
            document.getElementById("loop-count").innerText = `Loop ${gameState.loop}`;

            if (gameState.player.statPoints > 0 && !gameState.inCombat) {
                document.getElementById("stat-points-alert").style.display = "inline";
            } else {
                document.getElementById("stat-points-alert").style.display = "none";
            }
        }

        function upgradeStat(statKey) {
            if (gameState.player.statPoints > 0) {
                gameState.player.statPoints--;
                if (statKey === "str") gameState.player.str += 2;
                if (statKey === "def") gameState.player.def += 1;
                renderScene("hub_stats");
            }
        }

        function buyConsumable(name, cost) {
            if (gameState.player.credits >= cost) {
                gameState.player.credits -= cost;
                gameState.player.inventory.push(name);
                renderScene("hub_shop");
            } else { alert("Insufficient credits!"); }
        }

        function buyWeapon(wpnKey) {
            let data = weaponsData[wpnKey];
            if (gameState.player.credits >= data.cost) {
                if (gameState.player.inventory.includes(data.name)) {
                    alert("Blueprint structure already assembled!");
                    return;
                }
                gameState.player.credits -= data.cost;
                gameState.player.inventory.push(data.name);
                
                autoEquipBestWeapon(); 
                renderScene("hub_shop");
            } else { alert("Insufficient credits!"); }
        }

        function generateCombatChoices() {
            const choicesBox = document.getElementById("choices-box");
            choicesBox.innerHTML = "";

            if (gameState.player.hp <= 0) {
                document.getElementById("story-box").innerText = "🚨 SIMULATION CRITICAL TERMINATION. System wipe imminent.";
                const restartBtn = document.createElement("button");
                restartBtn.className = "btn";
                restartBtn.innerText = "Reinitialize Clone Buffer (Restart)";
                restartBtn.onclick = () => location.reload();
                choicesBox.appendChild(restartBtn);
                return;
            }

            if (!gameState.enemies.enemy1.alive && !gameState.enemies.enemy2.alive) {
                gameState.inCombat = false;
                document.getElementById("enemy-panel").style.display = "none";
                renderScene(gameState.combatSuccessScene);
                return;
            }

            if (gameState.enemies.enemy1.alive) {
                const btn = document.createElement("button");
                btn.className = "btn btn-combat";
                btn.innerText = `💥 Discharge weapon at ${gameState.enemies.enemy1.name}`;
                btn.onclick = () => executeTurn("attack", "enemy1");
                choicesBox.appendChild(btn);
            }

            if (gameState.enemies.enemy2.alive) {
                const btn = document.createElement("button");
                btn.className = "btn btn-combat";
                btn.innerText = `💥 Discharge weapon at ${gameState.enemies.enemy2.name}`;
                btn.onclick = () => executeTurn("attack", "enemy2");
                choicesBox.appendChild(btn);
            }

            if (gameState.player.level >= 3) {
                const btn = document.createElement("button");
                btn.className = "btn btn-magic";
                btn.innerText = `🔥 Cast Fire Burst (Costs 8 MP) - Attacks ALL targets`;
                btn.onclick = () => executeTurn("fire");
                choicesBox.appendChild(btn);
            }

            if (gameState.player.level >= 5) {
                const btn = document.createElement("button");
                btn.className = "btn btn-magic";
                btn.innerText = `🩹 Cast Nanite Heal (Costs 12 MP) - Heals +50 HP`;
                btn.onclick = () => executeTurn("heal");
                choicesBox.appendChild(btn);
            }

            if (gameState.player.inventory.includes("Bio-Gel")) {
                const btn = document.createElement("button");
                btn.className = "btn";
                btn.innerText = "🧪 Route Bio-Gel to Suit Filters (+25 HP)";
                btn.onclick = () => useItemInCombat();
                choicesBox.appendChild(btn);
            }
        }

        function handleReward(target) {
            let logSnippet = `✨ <strong>${target.name} neutralized.</strong>`;
            gameState.player.exp += target.expReward;
            logSnippet += ` Gained ${target.expReward} EXP.`;
            
            if (gameState.player.exp >= gameState.player.nextLevelExp) {
                gameState.player.exp -= gameState.player.nextLevelExp;
                gameState.player.level++;
                gameState.player.maxHp += 20;
                gameState.player.maxMp += 10; 
                gameState.player.statPoints += 1;
                logSnippet += `<br><span style='color:#00ff66;font-weight:bold;'>🎉 RE-CALIBRATION: Level ${gameState.player.level}! Max HP/MP expanded!</span>`;
            }

            gameState.player.credits += target.creditReward;
            logSnippet += ` Secured 🪙${target.creditReward} credits.<br>..`;
            return logSnippet;
        }

        function executeTurn(actionType, targetKey = null) {
            let log = "";

            if (actionType === "attack") {
                let currentWpn = gameState.player.currentWeapon;
                let baseWpnDmg = weaponsData[currentWpn] ? weaponsData[currentWpn].dmg : 5;
                let totalPlayerDmg = baseWpnDmg + Math.floor(gameState.player.str / 2);

                let target = gameState.enemies[targetKey];
                target.hp -= totalPlayerDmg;
                log += `You strike ${target.name} for ${totalPlayerDmg} kinetic damage.<br>`;

                if (target.hp <= 0) {
                    target.hp = 0; target.alive = false;
                    log += handleReward(target);
                    document.getElementById(`card-${targetKey}`).style.opacity = "0.2";
                    document.getElementById(`sprite-${targetKey}`).innerText = "\n  *NEUTRALIZED* \n";
                }
            } 
            else if (actionType === "fire") {
                if (gameState.player.mp < 8) {
                    alert("Insufficient MP Matrix energy pools!");
                    return;
                }
                gameState.player.mp -= 8;
                let fireDmg = 30 + Math.floor(gameState.player.str / 2);
                log += `🔥 You throw a thermal fire explosion sweeping the chamber for ${fireDmg} damage!<br>`;

                ['enemy1', 'enemy2'].forEach(key => {
                    let target = gameState.enemies[key];
                    if (target.alive) {
                        target.hp -= fireDmg;
                        if (target.hp <= 0) {
                            target.hp = 0; target.alive = false;
                            log += handleReward(target);
                            document.getElementById(`card-${key}`).style.opacity = "0.2";
                            document.getElementById(`sprite-${key}`).innerText = "\n  *NEUTRALIZED* \n";
                        }
                    }
                });
            } 
            else if (actionType === "heal") {
                if (gameState.player.mp < 12) {
                    alert("Insufficient MP Matrix energy pools!");
                    return;
                }
                gameState.player.mp -= 12;
                gameState.player.hp = Math.min(gameState.player.hp + 50, gameState.player.maxHp);
                log += `🩹 Balanced Nanite spell casting completed! Repaired +50 Structural Integrity.<br>`;
            }

            document.getElementById("hp-enemy1").innerText = gameState.enemies.enemy1.hp;
            document.getElementById("hp-enemy2").innerText = gameState.enemies.enemy2.hp;

            log += "<span style='color: #ff3333;'>";
            ['enemy1', 'enemy2'].forEach(key => {
                let enemy = gameState.enemies[key];
                if (enemy.alive) {
                    let netEnemyDmg = Math.max(1, enemy.dmg - Math.floor(gameState.player.def / 2));
                    gameState.player.hp -= netEnemyDmg;
                    log += `• ${enemy.name} counters for ${netEnemyDmg} dmg (Blocked ${Math.floor(gameState.player.def / 2)}).<br>`;
                }
            });
            log += "</span>";

            if (gameState.player.hp <= 0) gameState.player.hp = 0;
            document.getElementById("log-box").innerHTML = log;
            updateUI();
            generateCombatChoices();
        }

        function useItemInCombat() {
            gameState.player.hp = Math.min(gameState.player.hp + 25, gameState.player.maxHp);
            const index = gameState.player.inventory.indexOf("Bio-Gel");
            if (index > -1) gameState.player.inventory.splice(index, 1);
            
            let log = "Bio-Gel application completed (+25 HP).<br>";
            log += "<span style='color: #ff3333;'>";
            ['enemy1', 'enemy2'].forEach(key => {
                let enemy = gameState.enemies[key];
                if (enemy.alive) {
                    let netEnemyDmg = Math.max(1, enemy.dmg - Math.floor(gameState.player.def / 2));
                    gameState.player.hp -= netEnemyDmg;
                    log += `• ${enemy.name} impacts hull for ${netEnemyDmg} damage.<br>`;
                }
            });
            log += "</span>";

            if (gameState.player.hp <= 0) gameState.player.hp = 0;
            document.getElementById("log-box").innerHTML = log;
            updateUI();
            generateCombatChoices();
        }

        autoEquipBestWeapon();
        renderScene("med_bay");
    </script>
</body>
</html>
